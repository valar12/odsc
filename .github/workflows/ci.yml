name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Pester (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          $PesterConfiguration = New-PesterConfiguration
          $PesterConfiguration.Run.Path = 'tests'
          $PesterConfiguration.Run.Exit = $true
          $PesterConfiguration.Output.Verbosity = 'Detailed'

          Invoke-Pester -Configuration $PesterConfiguration

name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-powershell-gallery
  cancel-in-progress: false

jobs:
  powershell-gallery:
    name: PowerShell Gallery
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: powershell-gallery

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0
          Install-Module -Name MSAL.PS -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: |
          $Manifest = Test-ModuleManifest -Path 'src/odscex.psd1'
          "MODULE_VERSION=$($Manifest.Version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify release tag matches module version
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $Manifest = Test-ModuleManifest -Path 'src/odscex.psd1'
          $ExpectedTag = "v$($Manifest.Version)"

          if ($env:GITHUB_REF_NAME -ne $ExpectedTag) {
              throw "Release tag '$env:GITHUB_REF_NAME' does not match module version '$($Manifest.Version)'. Expected '$ExpectedTag'."
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          $PesterConfiguration = New-PesterConfiguration
          $PesterConfiguration.Run.Path = 'tests'
          $PesterConfiguration.Run.Exit = $true
          $PesterConfiguration.Output.Verbosity = 'Detailed'

          Invoke-Pester -Configuration $PesterConfiguration

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
              throw 'PowerShell Gallery API key is missing. Add it as the PSGALLERY_API_KEY repository or environment secret.'
          }

          Publish-Module -Path 'src' -Repository PSGallery -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose
